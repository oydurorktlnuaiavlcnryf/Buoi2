<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Posts - Trần Biện Minh Tâm</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container py-4">
        <!-- Header -->
        <div class="text-center mb-4">
            <h1 class="fw-bold text-primary"><i class="bi bi-table"></i> Quản Lý Posts</h1>
            <p class="text-muted">Trần Biện Minh Tâm - 2280614642</p>
        </div>

        <!-- Search Bar -->
        <div class="card shadow-sm mb-3">
            <div class="card-body">
                <div class="row align-items-center">
                    <div class="col-md-6 mb-2 mb-md-0">
                        <div class="input-group">
                            <span class="input-group-text bg-primary text-white">
                                <i class="bi bi-search"></i>
                            </span>
                            <input type="text" id="search_input" class="form-control form-control-lg"
                                placeholder="Tìm kiếm theo tên..." oninput="onChanged()">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="btn-group w-100" role="group">
                            <button class="btn btn-outline-primary" onclick="sortBy('title', 'asc')" title="Tên A-Z">
                                <i class="bi bi-sort-alpha-down"></i> Tên ↑
                            </button>
                            <button class="btn btn-outline-primary" onclick="sortBy('title', 'desc')" title="Tên Z-A">
                                <i class="bi bi-sort-alpha-up"></i> Tên ↓
                            </button>
                            <button class="btn btn-outline-success" onclick="sortBy('views', 'asc')" title="Views tăng dần">
                                <i class="bi bi-sort-numeric-down"></i> Views ↑
                            </button>
                            <button class="btn btn-outline-success" onclick="sortBy('views', 'desc')" title="Views giảm dần">
                                <i class="bi bi-sort-numeric-up"></i> Views ↓
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Data Table -->
        <div class="card shadow-sm mb-3">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <span><i class="bi bi-list-ul"></i> Danh sách Posts</span>
                <span id="count_badge" class="badge bg-light text-primary">0 posts</span>
            </div>
            <div class="card-body p-0">
                <table class="table table-striped table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th scope="col" style="width: 10%">#ID</th>
                            <th scope="col" style="width: 40%">Title</th>
                            <th scope="col" style="width: 20%">Views</th>
                            <th scope="col" style="width: 30%">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr>
                            <td colspan="4" class="text-center text-muted py-4">
                                <div class="spinner-border text-primary" role="status"></div>
                                <p class="mt-2">Đang tải dữ liệu...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Add/Edit Form -->
        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <i class="bi bi-plus-circle"></i> Thêm / Sửa Post
            </div>
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-2">
                        <label for="id_txt" class="form-label fw-bold">ID</label>
                        <input type="text" class="form-control" id="id_txt" placeholder="ID">
                    </div>
                    <div class="col-md-4">
                        <label for="title_txt" class="form-label fw-bold">Title</label>
                        <input type="text" class="form-control" id="title_txt" placeholder="Nhập title...">
                    </div>
                    <div class="col-md-3">
                        <label for="views_txt" class="form-label fw-bold">Views</label>
                        <input type="text" class="form-control" id="views_txt" placeholder="Nhập views...">
                    </div>
                    <div class="col-md-3">
                        <button class="btn btn-success w-100" onclick="Save()">
                            <i class="bi bi-save"></i> Lưu
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-4 text-muted">
            <small>© 2026 - Trần Biện Minh Tâm | MSSV: 2280614642 | NNPTUD - Buổi 2</small>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Main JS -->
    <script src="main.js"></script>
</body>

</html>
